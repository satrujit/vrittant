<h2>{{ title_or or title_en }}</h2>
<div class="vw-row">
  <span class="vw-num" style="font-size:22px;">{{ data.aqi|round|int if data.aqi is not none else '—' }}</span>
  <span class="vw-sub">{{ data.band_or }} · AQI</span>
</div>
<div style="margin-top:8px; display:grid; grid-template-columns:repeat(2, 1fr); gap:4px 12px;">
  <div class="vw-row"><span class="vw-sub">PM2.5</span><span class="vw-num">{{ data.pm2_5 }} µg/m³</span></div>
  <div class="vw-row"><span class="vw-sub">PM10</span><span class="vw-num">{{ data.pm10 }} µg/m³</span></div>
  <div class="vw-row"><span class="vw-sub">O₃</span><span class="vw-num">{{ data.ozone }}</span></div>
  <div class="vw-row"><span class="vw-sub">NO₂</span><span class="vw-num">{{ data.no2 }}</span></div>
</div>
{% include "_source.html" %}
