<!doctype html>
<html lang="or">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vrittant Widgets</title>
  <style>
    :root {
      --vw-primary: #FA6C38;
      --vw-bg: #ffffff;
      --vw-text: #1a1a1a;
      --vw-muted: #6b6b6b;
      --vw-border: #ececec;
      --vw-card: #fafafa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Noto Sans Oriya', 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--vw-bg);
      color: var(--vw-text);
      font-size: 14px;
      line-height: 1.5;
    }
    .vw-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      align-items: start;
    }
    .vw-card {
      background: var(--vw-card);
      border: 1px solid var(--vw-border);
      border-radius: 10px;
      padding: 14px;
    }
    .vw-card h2 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--vw-primary);
      font-weight: 600;
    }
    .vw-card .vw-sub { color: var(--vw-muted); font-size: 12px; }
    .vw-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .vw-num { font-variant-numeric: tabular-nums; font-weight: 600; }
    blockquote { margin: 8px 0; padding-left: 10px; border-left: 3px solid var(--vw-primary); }
    a { color: var(--vw-primary); text-decoration: none; }
    .vw-source {
      margin-top: 10px;
      padding-top: 6px;
      border-top: 1px dashed var(--vw-border);
      font-size: 11px;
      color: var(--vw-muted);
      text-align: right;
    }
    .vw-source a { color: var(--vw-muted); }
    table.vw-table { width:100%; border-collapse: collapse; font-size: 13px; }
    table.vw-table th, table.vw-table td { padding: 4px 6px; text-align: left; border-bottom: 1px solid var(--vw-border); }
    table.vw-table th { color: var(--vw-muted); font-weight: 500; font-size: 11px; }
    table.vw-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  </style>
</head>
<body>
{{ body_html | safe }}
{{ resize_script | safe }}
</body>
</html>
