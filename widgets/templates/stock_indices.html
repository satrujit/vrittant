<h2>{{ title_or or title_en }}</h2>
<table class="vw-table">
  <tbody>
    {% for r in data.rows %}
    <tr>
      <td>{{ r.label_or }}</td>
      <td class="num">{{ '{:,.2f}'.format(r.price) }}</td>
      <td class="num" style="color: {% if r.change >= 0 %}#16a34a{% else %}#dc2626{% endif %};">
        {% if r.change >= 0 %}+{% endif %}{{ r.change }} ({{ r.pct }}%)
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% include "_source.html" %}
