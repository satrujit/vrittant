<h2>{{ title_or or title_en }}</h2>
{% if data.name %}<div class="vw-sub">{{ data.name }} · {{ data.date }}</div>{% endif %}
<table class="vw-table" style="margin-top:6px;">
  <tbody>
    {% for r in data.rows %}
    <tr>
      <td style="width:20px;"><strong>{{ r.pos }}</strong></td>
      <td>
        <div>{{ r.name }}</div>
        <div class="vw-sub">{{ r.team }}</div>
      </td>
      <td class="num" style="font-size:11px;">{{ r.time }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% include "_source.html" %}
