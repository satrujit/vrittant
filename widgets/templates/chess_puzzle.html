<h2>{{ title_or or title_en }}</h2>
<div class="vw-sub">Rating: <strong>{{ data.rating }}</strong></div>
{% if data.board_img %}
  <div style="margin:8px 0;">
    <img src="{{ data.board_img }}" alt="Chess puzzle board"
         style="width:100%; max-width:240px; display:block; margin:0 auto; border-radius:4px;">
  </div>
{% endif %}
{% if data.themes %}
  <div style="display:flex; flex-wrap:wrap; gap:4px; margin:6px 0;">
    {% for t in data.themes[:4] %}
      <span style="font-size:10px; padding:2px 6px; background:#f3f4f6; border-radius:8px;">{{ t }}</span>
    {% endfor %}
  </div>
{% endif %}
<div style="margin-top:8px; padding:8px; background:#fef3c7; border-left:3px solid #f59e0b; border-radius:4px; font-size:12px;">
  <strong>💡 ଟିପ୍:</strong> {{ data.tip_or }}
</div>
<a href="{{ data.url }}" target="_blank" rel="noopener" style="display:inline-block; margin-top:8px; font-size:12px;">Lichess-ରେ ସମାଧାନ କରନ୍ତୁ →</a>
{% include "_source.html" %}
