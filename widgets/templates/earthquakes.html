<h2>{{ title_or or title_en }}</h2>
{% if data.rows %}
<table class="vw-table">
  <tbody>
    {% for r in data.rows %}
    <tr>
      <td class="num" style="width:40px; font-size:16px; font-weight:700; color: {% if r.mag >= 6 %}#dc2626{% elif r.mag >= 5 %}#f59e0b{% else %}#6b7280{% endif %};">
        {{ r.mag }}
      </td>
      <td>
        <div>{{ r.place }}</div>
        <div class="vw-sub">{{ r.time }}</div>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="vw-sub">No M4.5+ events in last 24 hours.</div>
{% endif %}
{% include "_source.html" %}
