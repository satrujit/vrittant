<h2>{{ title_or or title_en }}</h2>
<div class="vw-sub">{{ data.snapshot }}</div>
<table class="vw-table" style="margin-top:4px;">
  <tbody>
    {% for r in data.rows %}
    <tr>
      <td style="width:18px;"><strong>{{ r.rank }}</strong></td>
      <td>
        <div>{{ r.name_or or r.name }}</div>
        <div class="vw-sub">{{ r.src_or or r.src }}</div>
      </td>
      <td class="num">${{ r.wealth_usd_b }}B</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% include "_source.html" %}
