<h2>{{ title_or or title_en }}</h2>
<table class="vw-table">
  <thead>
    <tr>
      <th>ସ୍ଥାନ</th>
      <th style="text-align:right;">ସର୍ବାଧିକ</th>
      <th style="text-align:right;">ସର୍ବନିମ୍ନ</th>
    </tr>
  </thead>
  <tbody>
    {% for c in data.cities %}
    <tr>
      <td>{{ c.name_or }}</td>
      <td class="num">{{ c.max|round|int if c.max is not none else '—' }}°</td>
      <td class="num">{{ c.min|round|int if c.min is not none else '—' }}°</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% include "_source.html" %}
