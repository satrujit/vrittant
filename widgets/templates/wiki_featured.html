<h2>{{ title_or or title_en }}</h2>
{% if data.image %}
  <img src="{{ data.image }}" alt="" style="width:100%; max-height:140px; object-fit:cover; border-radius:6px; margin-bottom:8px;">
{% endif %}
<div style="font-weight:700;">{{ data.title }}</div>
{% if data.description %}<div class="vw-sub">{{ data.description }}</div>{% endif %}
<p style="margin:8px 0 0; font-size:13px;">{{ data.extract_or or data.extract }}</p>
{% if data.url %}
  <a href="{{ data.url }}" target="_blank" rel="noopener" style="display:inline-block; margin-top:6px; font-size:12px;">Read on Wikipedia →</a>
{% endif %}
{% include "_source.html" %}
