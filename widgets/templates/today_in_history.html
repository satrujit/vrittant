<h2>{{ title_or or title_en }}</h2>
<div class="vw-sub">{{ data.label }}</div>
<ul style="padding-left:18px; margin:8px 0 0; max-height:340px; overflow-y:auto;">
  {% for e in data.events %}
    <li style="margin-bottom:6px;">
      <strong>{{ e.year }}</strong> —
      {% if e.text_or %}{{ e.text_or }}{% else %}{{ e.text }}{% endif %}
    </li>
  {% endfor %}
</ul>
{% include "_source.html" %}
