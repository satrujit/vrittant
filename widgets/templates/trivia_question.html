<h2>{{ title_or or title_en }}</h2>
<div class="vw-sub">{{ data.category }} · {{ data.difficulty }}</div>
<p style="margin:8px 0; font-weight:600;">{{ data.question }}</p>
<ol style="padding-left:20px; margin:0;">
  {% for o in data.options %}
    <li style="margin-bottom:3px;">{{ o }}</li>
  {% endfor %}
</ol>
<details style="margin-top:8px;">
  <summary style="cursor:pointer; font-size:12px; color:#16a34a;">Show answer</summary>
  <div style="margin-top:4px; font-weight:600;">{{ data.answer_or or data.answer }}</div>
</details>
{% include "_source.html" %}
