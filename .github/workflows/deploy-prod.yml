name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ─── Run Tests First ───
  tests:
    uses: ./.github/workflows/ci.yml

  # ─── Deploy API to Cloud Run (Production) ───
  deploy-api:
    name: Deploy API → Production
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: api
        run: |
          gcloud run deploy vrittant-api \
            --source . \
            --region asia-south1 \
            --project vrittant-f5ef2 \
            --allow-unauthenticated \
            --add-cloudsql-instances=vrittant-f5ef2:asia-south1:vrittant-db \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,SARVAM_API_KEY=SARVAM_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,MSG91_AUTHKEY=MSG91_AUTHKEY:latest,GUPSHUP_API_KEY=GUPSHUP_API_KEY:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_VERIFY_SERVICE_SID=TWILIO_VERIFY_SERVICE_SID:latest,INTERNAL_TOKEN=INTERNAL_TOKEN:latest" \
            --update-env-vars="^||^ENV=prod||FIREBASE_PROJECT_ID=vrittant-f5ef2||STORAGE_BACKEND=gcs||GCS_BUCKET=vrittant-uploads||CORS_ORIGINS=https://vrittant.in,https://vrittant-f5ef2.web.app||SARVAM_BASE_URL=https://api.sarvam.ai||MSG91_WIDGET_ID=${{ secrets.MSG91_WIDGET_ID }}||MSG91_TOKEN_AUTH=${{ secrets.MSG91_TOKEN_AUTH }}||OTP_PROVIDER=twilio"

  # ─── Deploy Frontend to Firebase (Production) ───
  deploy-panel:
    name: Deploy Panel → Production
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: reviewer-panel/package-lock.json

      - name: Install & Build (Production)
        working-directory: reviewer-panel
        run: |
          npm ci
          npm install -g firebase-tools
          npx vite build --mode production

      - name: Deploy to Firebase (Production)
        working-directory: reviewer-panel
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: firebase deploy --only hosting:production --project vrittant-f5ef2
