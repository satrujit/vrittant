name: Deploy to UAT

on:
  push:
    branches: [develop]

jobs:
  # ─── Run Tests First ───
  tests:
    uses: ./.github/workflows/ci.yml

  # ─── Deploy API to Cloud Run (UAT) ───
  deploy-api:
    name: Deploy API → UAT
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: api
        run: |
          gcloud run deploy vrittant-api-uat \
            --source . \
            --region asia-south1 \
            --project vrittant-f5ef2 \
            --allow-unauthenticated \
            --add-cloudsql-instances=vrittant-f5ef2:asia-south1:vrittant-db \
            --set-env-vars="ENV=uat,DATABASE_URL=${{ secrets.DATABASE_URL_UAT }},SECRET_KEY=${{ secrets.SECRET_KEY }},SARVAM_API_KEY=${{ secrets.SARVAM_API_KEY }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},INTERNAL_TOKEN=${{ secrets.INTERNAL_TOKEN }},FIREBASE_PROJECT_ID=vrittant-f5ef2,STORAGE_BACKEND=gcs,GCS_BUCKET=vrittant-uploads,CORS_ORIGINS=https://vrittant-uat.web.app,SARVAM_BASE_URL=https://api.sarvam.ai,MSG91_AUTHKEY=${{ secrets.MSG91_AUTHKEY }},MSG91_WIDGET_ID=${{ secrets.MSG91_WIDGET_ID }},MSG91_TOKEN_AUTH=${{ secrets.MSG91_TOKEN_AUTH }},GUPSHUP_API_KEY=${{ secrets.GUPSHUP_API_KEY }},OTP_PROVIDER=twilio,TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }},TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }},TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}"

  # ─── Deploy Frontend to Firebase (UAT) ───
  deploy-panel:
    name: Deploy Panel → UAT
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: reviewer-panel/package-lock.json

      - name: Install & Build (UAT)
        working-directory: reviewer-panel
        run: |
          npm ci
          npm install -g firebase-tools
          npx vite build --mode uat

      - name: Deploy to Firebase (UAT site)
        working-directory: reviewer-panel
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: firebase deploy --only hosting:uat --project vrittant-f5ef2
